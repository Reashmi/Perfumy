<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perfumy | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            height:100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
            url("https://images.unsplash.com/photo-1592945403244-b3fbafd7f539") center/cover no-repeat;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .login-box{
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding:35px;
            width:350px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            text-align:center;
            color:white;
        }

        h2{
            margin-bottom:25px;
            letter-spacing:2px;
        }

        .input-box{
            margin-bottom:18px;
            text-align:left;
        }

        label{
            font-size:14px;
        }

        input{
            width:100%;
            padding:10px;
            border:none;
            outline:none;
            border-radius:8px;
            margin-top:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#e91e63;
            border:none;
            border-radius:25px;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#c2185b;
        }

        .message{
            margin-top:15px;
            font-size:14px;
            font-weight:bold;
        }

        .error{
            color:#ffb6b6;
        }

        .success{
            color:#9cff9c;
        }
        
    </style>
</head>

<body>
    

<div class="login-box">
    <h2>PERFUMY</h2>

    <form action="navi.html" onsubmit="return validateLogin()">
        <div class="input-box">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter email">
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button type="submit" >Login</button> <a href="signup.html">Signup</a>
       
    </form>

    <div class="message" id="msg"></div>
</div>

<script>
    function validateLogin(){
        let email = document.getElementById("email").value.trim();
        let password = document.getElementById("password").value.trim();
        let msg = document.getElementById("msg");

        if(email === "" || password === ""){
            msg.innerHTML = "⚠️ All fields are required";
            msg.className = "message error";
            return false;
        }

        // success
        msg.innerHTML = "✅ Login Successful";
        msg.className = "message success";
        

        // prevent actual form submit (demo purpose)
        return true;
    }
</script>

</body>
</html>
