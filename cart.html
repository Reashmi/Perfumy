<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Perfumy | Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia,serif}
body{background:#f6efe6;color:#2b2b2b}

nav{
    padding:20px 60px;
    display:flex;
    justify-content:space-between;
}
nav a{text-decoration:none;color:#2b2b2b;margin-left:20px}

.section{padding:60px;}

.cart-item{
    display:flex;
    gap:20px;
    background:#fff;
    padding:20px;
    margin-bottom:20px;
    align-items:center;
}
.cart-item img{width:100px;height:100px;object-fit:cover}
.cart-item-details{flex:1}
.cart-item-details h3{margin-bottom:5px}
.cart-item-details p{margin-bottom:10px}
.cart-item-details .qty{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}
.cart-item-details .qty button{
    padding:5px 10px;
    cursor:pointer;
}
.cart-item button.remove{
    padding:8px 12px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

.total-box{
    background:#fff;
    padding:20px;
    text-align:right;
    font-size:18px;
    font-weight:bold;
}
button.checkout{
    margin-top:20px;
    padding:12px 20px;
    background:#2b2b2b;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
    <h3>PERFUMY</h3>
    <div>
        <a href="shop.html">Shop</a>
        
    </div>
</nav>

<section class="section">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="total-box" id="grandTotal">Total: ₹0</div>
    <button class="checkout" onclick="checkout()">Proceed to Checkout</button>
</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartItems = document.getElementById("cartItems");
let grandTotalBox = document.getElementById("grandTotal");

function renderCart(){
    cartItems.innerHTML = "";
    let total = 0;

    if(cart.length===0){
        cartItems.innerHTML = "<p>Your cart is empty</p>";
        grandTotalBox.innerText = "Total: ₹0";
        return;
    }

    cart.forEach((item,index)=>{
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        cartItems.innerHTML += `
        <div class="cart-item">
            <img src="${item.img}">
            <div class="cart-item-details">
                <h3>${item.name}</h3>
                <p>Price: ₹${item.price}</p>
                <div class="qty">
                    <button onclick="changeQty(${index},-1)">-</button>
                    <span>${item.qty}</span>
                    <button onclick="changeQty(${index},1)">+</button>
                </div>
                <p>Subtotal: ₹${itemTotal}</p>
            </div>
            <button class="remove" onclick="removeItem(${index})">Remove</button>
        </div>
        `;
    });

    grandTotalBox.innerText = "Total: ₹" + total;
}

function changeQty(index,delta){
    cart[index].qty += delta;
    if(cart[index].qty<1) cart[index].qty=1;
    localStorage.setItem("cart",JSON.stringify(cart));
    renderCart();
}

function removeItem(index){
    if(confirm("Remove this item from cart?")){
        cart.splice(index,1);
        localStorage.setItem("cart",JSON.stringify(cart));
        renderCart();
    }
}

function checkout(){
    if(cart.length===0){
        alert("Cart is empty!");
        return;
    }
    window.location.href = "checkout.html";
}

renderCart();
</script>

</body>
</html>
