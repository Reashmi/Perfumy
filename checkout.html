<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Perfumy | Cart & Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia,serif}
body{background:#f6efe6;color:#2b2b2b}
nav{padding:20px 60px;display:flex;justify-content:space-between}
nav a{text-decoration:none;color:#2b2b2b;margin-left:20px}

.section{padding:40px;display:grid;grid-template-columns:1fr 1fr;gap:40px}

/* CART */
.cart-box{background:#fff;padding:20px}
.cart-item{display:flex;gap:15px;margin-bottom:15px;align-items:center}
.cart-item img{width:80px;height:80px;object-fit:cover}
.cart-item-details{flex:1}
.cart-item-details h3{margin-bottom:5px}
.cart-item-details p{margin-bottom:5px}
.qty{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.qty button{padding:5px 10px;cursor:pointer}
button.remove{padding:5px 10px;background:red;color:white;border:none;cursor:pointer}
.total-box{font-weight:bold;font-size:18px;margin-top:10px;text-align:right}

/* FORM */
.form-box{background:#fff;padding:20px}
.form-box input,.form-box textarea,.form-box select{width:100%;padding:10px;margin:8px 0}
button.place-order{padding:12px 0;width:100%;background:#2b2b2b;color:white;border:none;cursor:pointer;margin-top:10px}
</style>
</head>

<body>

<nav>
    <h3>PERFUMY</h3>
    <div>
        <a href="shop.html">Shop</a>
        <a href="checkout.html">Cart</a>
    </div>
</nav>

<section class="section">

<!-- CART -->
<div class="cart-box">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="total-box" id="grandTotal">Total: ₹0</div>
</div>

<!-- CHECKOUT -->
<div class="form-box">
    <h2>Delivery Details</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="phone" placeholder="Phone Number">
    <textarea id="address" placeholder="Delivery Address"></textarea>
    <h3>Payment Method</h3>
    <select id="payment">
        <option value="">Select Payment</option>
        <option>Cash on Delivery</option>
        <option>UPI</option>
        <option>Credit / Debit Card</option>
    </select>
    <button class="place-order" onclick="placeOrder()">Place Order</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartItems = document.getElementById("cartItems");
let grandTotalBox = document.getElementById("grandTotal");

// RENDER CART
function renderCart(){
    cartItems.innerHTML="";
    let total = 0;
    if(cart.length===0){
        cartItems.innerHTML = "<p>Your cart is empty</p>";
        grandTotalBox.innerText="Total: ₹0";
        return;
    }

    cart.forEach((item,index)=>{
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        cartItems.innerHTML += `
        <div class="cart-item">
            <img src="${item.img}">
            <div class="cart-item-details">
                <h3>${item.name}</h3>
                <p>Price: ₹${item.price}</p>
                <div class="qty">
                    <button onclick="changeQty(${index},-1)">-</button>
                    <span>${item.qty}</span>
                    <button onclick="changeQty(${index},1)">+</button>
                </div>
                <p>Subtotal: ₹${itemTotal}</p>
            </div>
            <button class="remove" onclick="removeItem(${index})">Remove</button>
        </div>`;
    });

    grandTotalBox.innerText = "Total: ₹" + total;
}

// CHANGE QTY
function changeQty(index,delta){
    cart[index].qty += delta;
    if(cart[index].qty<1) cart[index].qty=1;
    localStorage.setItem("cart",JSON.stringify(cart));
    renderCart();
}

// REMOVE ITEM
function removeItem(index){
    if(confirm("Remove this item from cart?")){
        cart.splice(index,1);
        localStorage.setItem("cart",JSON.stringify(cart));
        renderCart();
    }
}

// PLACE ORDER
function placeOrder(){
    if(cart.length===0){
        alert("Cart is empty!");
        return;
    }

    let name=document.getElementById("name").value.trim();
    let phone=document.getElementById("phone").value.trim();
    let address=document.getElementById("address").value.trim();
    let payment=document.getElementById("payment").value;

    if(!name||!phone||!address||!payment){
        alert("Please fill all details");
        return;
    }

    let total = cart.reduce((sum,item)=>sum+item.price*item.qty,0);

    alert(
        "Order Placed Successfully 🎉\n\n"+
        "Name: "+name+"\n"+
        "Payment: "+payment+"\n"+
        "Total: ₹"+total
    );

    localStorage.removeItem("cart");
    cart=[];
    renderCart();

    // Reset form
    document.getElementById("name").value="";
    document.getElementById("phone").value="";
    document.getElementById("address").value="";
    document.getElementById("payment").value="";
}

renderCart();
</script>

</body>
</html>
